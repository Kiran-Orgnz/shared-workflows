name: Port logs to elastic

on:
  workflow_call:
    inputs:
      release_tag:
        description: "The unique release tag"
        type: string
        required: true
      helm_env:
        description: "Helm Chart Environment"
        type: string
        required: true

jobs:
  port-job-logs-to-elastic:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ship job results
        uses: actions/github-script@v7
        env:
          ELASTIC_INDEX: ${{ secrets.ELASTIC_INDEX }}
          ELASTIC_HOST: ${{ secrets.ELASTIC_HOST }}
          ELASTIC_KEY: ${{ secrets.ELASTIC_KEY }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          HELM_ENV: ${{ inputs.helm_env }}
          ACTOR: ${{ github.actor }}
        with:
          script: |
            const runId = context.runId;  
            const { data } = await github.rest.actions.listJobsForWorkflowRun({
            owner: context.repo.owner,
            repo: context.repo.repo,
                run_id: runId,
            });
        
            const elasticHost = process.env.ELASTIC_HOST;
            const elasticIndex = process.env.ELASTIC_INDEX;
            const elasticKey = process.env.ELASTIC_KEY;
        
            const elasticUrl = `${elasticHost}/${elasticIndex}/_doc`;
            core.info(`Posting to URL = ${elasticUrl}`);
        
            for (const job of jobs) {
                const body = {
                    "@timestamp": job.completed_at,
                    job_name: job.name,
                    status: job.status,
                    conclusion: job.conclusion,
                    started_at: job.started_at,
                    completed_at: job.completed_at,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: context.runId,
                    release_id: process.env.RELEASE_TAG,
                    env: process.env.HELM_ENV,
                    actor: process.env.ACTOR,
                    origin: "github",
                };
        
                const response = await fetch(elasticUrl, {
                    method: "POST",
                    headers: {
                    "Content-Type": "application/json",
                    Authorization: `ApiKey ${elasticKey}`,
                    },
                    body: JSON.stringify(body),
                });
        
            
                if (!response.ok) {
                    const txt = await response.text().catch(() => "");
                    core.warning(`Elastic error: ${response.status} ${response.statusText} ${txt}`);
                } else {
                    core.info(`Indexed job ${job.name}`);
                }
            }
